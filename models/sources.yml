version: 2

sources:
  - name: Ecomm
    database: Ecomm
    schema: main
    description: "Raw TheLook ecommerce tables loaded from Kaggle CSV files."

    tables:
      - name: orders
        description: "One row per order placed on the platform."
        columns:
          - name: order_id
            description: "Primary key."
            tests: [unique, not_null]
          - name: user_id
            tests: [not_null]
          - name: status
            tests: [not_null]

      - name: order_items
        description: "One row per line item within an order."
        columns:
          - name: id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: user_id
            tests: [not_null]

      - name: users
        description: "Registered customer accounts."
        columns:
          - name: id
            tests: [unique, not_null]

      - name: products
        description: "Product catalogue."
        columns:
          - name: id
            tests: [unique, not_null]

      - name: inventory_items
        description: "Individual inventory units, each linked to a product."
        columns:
          - name: id
            tests: [unique, not_null]

      - name: events
        description: "Web-session events (page views, clicks, purchases)."
        columns:
          - name: id
            tests: [unique, not_null]

      - name: distribution_centers
        description: "Physical fulfilment centres."
        columns:
          - name: id
            tests: [unique, not_null]
